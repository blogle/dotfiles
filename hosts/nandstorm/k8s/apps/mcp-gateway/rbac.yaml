apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-manager
  namespace: mcp-gateway
rules:
  # Scope the gateway's deploy/update/delete powers to this namespace only.
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "replicasets"]
    verbs: ["get", "list", "create", "update", "delete", "watch"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps", "secrets"]
    verbs: ["get", "list", "create", "update", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-manager-binding
  namespace: mcp-gateway
subjects:
  - kind: ServiceAccount
    name: mcpgateway-sa
    namespace: mcp-gateway
roleRef:
  kind: Role
  name: app-manager
  apiGroup: rbac.authorization.k8s.io
