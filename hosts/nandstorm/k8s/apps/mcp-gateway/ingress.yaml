apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcpgateway
  namespace: mcp-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # Apply allowlist first, then basic auth.
    traefik.ingress.kubernetes.io/router.middlewares: mcp-gateway-mcpgateway-ipallowlist@kubernetescrd,mcp-gateway-mcpgateway-basicauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mcpgateway.thejeffer.net
      secretName: mcpgateway-tls
  rules:
    - host: mcpgateway.thejeffer.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcpgateway-service
                port:
                  number: 8000
