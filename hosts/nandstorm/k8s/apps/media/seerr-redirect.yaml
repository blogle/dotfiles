apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jellyseerr-redirect-tls
  namespace: media
spec:
  secretName: jellyseerr-redirect-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  commonName: jellyseerr.thejeffer.net
  dnsNames:
    - jellyseerr.thejeffer.net
  privateKey:
    algorithm: RSA
    size: 2048
  renewBefore: 360h
---
apiVersion: v1
kind: Service
metadata:
  name: noop-404
  namespace: media
spec:
  selector:
    app: noop-404
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noop-404
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noop-404
  template:
    metadata:
      labels:
        app: noop-404
    spec:
      containers:
        - name: noop-404
          image: ghcr.io/traefik/whoami:v1.10
          ports:
            - containerPort: 8080
          command: ["/whoami"]
          args: ["--port=8080"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: seerr-redirect
  namespace: media
spec:
  redirectRegex:
    regex: ^https://jellyseerr\.thejeffer\.net/(.*)
    replacement: https://seerr.thejeffer.net/${1}
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyseerr-redirect
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyseerr.thejeffer.net`)
      kind: Rule
      priority: 100
      middlewares:
        - name: seerr-redirect
      services:
        - name: noop-404
          port: 80
  tls:
    secretName: jellyseerr-redirect-tls