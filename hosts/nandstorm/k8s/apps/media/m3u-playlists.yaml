apiVersion: v1
kind: PersistentVolume
metadata:
  name: m3u-playlists-pv
  labels: { app: m3u-playlists, component: static }
spec:
  capacity: { storage: 1Gi }
  accessModes: [ "ReadWriteOnce" ]
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values: [ "nandstorm" ]
  hostPath:
    path: /persist/m3u-playlists
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: m3u-playlists-pvc
  namespace: media
spec:
  storageClassName: ""
  volumeName: m3u-playlists-pv
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests: { storage: 1Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m3u-playlists
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m3u-playlists
  template:
    metadata:
      labels:
        app: m3u-playlists
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: playlists
          mountPath: /usr/share/nginx/html
        resources:
          limits:
            memory: "128Mi"
            cpu: "250m"
          requests:
            memory: "32Mi"
            cpu: "25m"
      volumes:
      - name: playlists
        persistentVolumeClaim:
          claimName: m3u-playlists-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: m3u-playlists
  namespace: media
spec:
  selector:
    app: m3u-playlists
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: m3u-playlists-strip-prefix
  namespace: media
spec:
  stripPrefix:
    prefixes:
    - /playlists
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: m3u-playlists
  namespace: media
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`acestream.thejeffer.net`) && PathPrefix(`/playlists`)
    kind: Rule
    priority: 100
    middlewares:
    - name: m3u-playlists-strip-prefix
    services:
    - name: m3u-playlists
      port: 80
  tls:
    secretName: acestream-proxy-tls
