apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      containers:
      - name: pocket-id
        image: ghcr.io/pocket-id/pocket-id:v2.5.0
        ports:
        - containerPort: 1411
          name: http
        env:
        - name: APP_URL
          value: https://id.thejeffer.net
        - name: ENCRYPTION_KEY_FILE
          value: /run/secrets/pocket-id/encryption-key
        - name: TRUST_PROXY
          value: "true"
        - name: ALLOW_INSECURE_CALLBACK_URLS
          value: "false"
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: secrets
          mountPath: /run/secrets/pocket-id
          readOnly: true
      volumes:
      - name: data
        hostPath:
          path: /persist/pocket-id
          type: DirectoryOrCreate
      - name: secrets
        secret:
          secretName: pocket-id-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: pocket-id
  namespace: auth
spec:
  selector:
    app: pocket-id
  ports:
  - name: http
    port: 1411
    targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pocket-id
  namespace: auth
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
  - hosts:
    - id.thejeffer.net
    secretName: pocket-id-tls
  rules:
  - host: id.thejeffer.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pocket-id
            port:
              name: http
