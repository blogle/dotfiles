# Traefik middleware to ensure only tailnet/LAN clients can reach the OpenClaw UI/WS.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: openclaw-ipallowlist
  namespace: openclaw
spec:
  ipWhiteList:
    sourceRange:
      # Tailscale CGNAT range
      - 100.64.0.0/10
      # Optional: LAN ranges (tighten to your real LAN CIDRs if possible)
      - 10.0.0.0/8
      - 192.168.0.0/16
      - 172.16.0.0/12
