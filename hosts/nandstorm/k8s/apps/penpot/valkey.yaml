apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: penpot-valkey
  namespace: penpot
spec:
  serviceName: penpot-valkey
  replicas: 1
  selector:
    matchLabels:
      app: penpot-valkey
  template:
    metadata:
      labels:
        app: penpot-valkey
    spec:
      containers:
      - name: valkey
        image: valkey/valkey:8.1
        args:
        - --appendonly
        - yes
        - --maxmemory
        - 128mb
        - --maxmemory-policy
        - volatile-lfu
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "valkey-cli ping | grep PONG"]
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "valkey-cli ping | grep PONG"]
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: penpot-valkey-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: penpot-valkey
  namespace: penpot
spec:
  selector:
    app: penpot-valkey
  ports:
  - port: 6379
    targetPort: 6379
