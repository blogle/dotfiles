apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: penpot-postgres
  namespace: penpot
spec:
  serviceName: penpot-postgres
  replicas: 1
  selector:
    matchLabels:
      app: penpot-postgres
  template:
    metadata:
      labels:
        app: penpot-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16.14-alpine3.22
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: penpot
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: penpot-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: penpot-secrets
              key: POSTGRES_PASSWORD
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: penpot-postgres-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: penpot-postgres
  namespace: penpot
spec:
  selector:
    app: penpot-postgres
  ports:
  - port: 5432
    targetPort: 5432
