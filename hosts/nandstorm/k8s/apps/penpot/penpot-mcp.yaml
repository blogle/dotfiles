---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-mcp
  namespace: penpot-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: penpot-mcp
  template:
    metadata:
      labels:
        app: penpot-mcp
    spec:
      containers:
      - name: penpot-mcp
        image: penpotapp/mcp:2.16.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4400
          name: plugin
          protocol: TCP
        - containerPort: 4401
          name: mcp-http
          protocol: TCP
        - containerPort: 4402
          name: websocket
          protocol: TCP
        env:
        - name: WS_URI
          value: "wss://mcp-ws.penpot.thejeffer.net"
        - name: PENPOT_MCP_SERVER_PORT
          value: "4401"
        - name: PENPOT_MCP_WEBSOCKET_PORT
          value: "4402"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: penpot-mcp
  namespace: penpot-mcp
spec:
  selector:
    app: penpot-mcp
  ports:
  - name: plugin
    port: 4400
    targetPort: 4400
  - name: mcp-http
    port: 4401
    targetPort: 4401
  - name: websocket
    port: 4402
    targetPort: 4402
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: penpot-mcp
  namespace: penpot-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - mcp.penpot.thejeffer.net
    secretName: penpot-mcp-tls
  rules:
  - host: mcp.penpot.thejeffer.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: penpot-mcp
            port:
              number: 4401
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: penpot-mcp-ws
  namespace: penpot-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - mcp-ws.penpot.thejeffer.net
    secretName: penpot-mcp-ws-tls
  rules:
  - host: mcp-ws.penpot.thejeffer.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: penpot-mcp
            port:
              number: 4402
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: penpot-mcp-plugin
  namespace: penpot-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - plugin.penpot.thejeffer.net
    secretName: penpot-mcp-plugin-tls
  rules:
  - host: plugin.penpot.thejeffer.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: penpot-mcp
            port:
              number: 4400
