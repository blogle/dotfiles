apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-backend
  namespace: penpot
  labels:
    helm.sh/chart: penpot-1.3.0
    app.kubernetes.io/name: penpot
    app.kubernetes.io/instance: penpot
    app.kubernetes.io/version: "2.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: penpot-backend
      app.kubernetes.io/instance: penpot
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: penpot-backend
        app.kubernetes.io/name: penpot-backend
        app.kubernetes.io/instance: penpot
    spec:
      serviceAccountName: penpot
      securityContext:
        fsGroup: 1001
      initContainers:
        - name: fix-assets-perms
          image: busybox:1.36
          command:
            - chown
            - -R
            - "1001:1001"
            - /opt/data/assets
          volumeMounts:
            - mountPath: /opt/data/assets
              name: app-data
          securityContext:
            runAsUser: 0
      containers:
        - name: penpot-backend
          image: penpotapp/backend:2.16.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
          env:
            - name: PENPOT_PUBLIC_URI
              value: https://penpot.thejeffer.net
            - name: PENPOT_FLAGS
              value: enable-registration enable-login-with-password disable-email-verification enable-log-emails enable-mcp
            - name: PENPOT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: PENPOT_SECRET_KEY
            - name: PENPOT_TELEMETRY_ENABLED
              value: "true"
            - name: PENPOT_TELEMETRY_REFERER
              value: kubernetes
            - name: PENPOT_DATABASE_URI
              value: postgresql://penpot-postgres:5432/penpot
            - name: PENPOT_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: POSTGRES_USER
            - name: PENPOT_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: POSTGRES_PASSWORD
            - name: PENPOT_REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: PENPOT_REDIS_URI
            - name: PENPOT_OBJECTS_STORAGE_BACKEND
              value: fs
            - name: PENPOT_OBJECTS_STORAGE_FS_DIRECTORY
              value: /opt/data/assets
            - name: PENPOT_FILE_DATA_BACKEND
              value: legacy-db
            - name: PENPOT_AUTO_FILE_SNAPSHOT_EVERY
              value: "5"
            - name: PENPOT_AUTO_FILE_SNAPSHOT_TIMEOUT
              value: 3h
          volumeMounts:
            - mountPath: /opt/data/assets
              name: app-data
              readOnly: false
          ports:
            - name: http
              containerPort: 6060
              protocol: TCP
          resources:
            limits: {}
            requests: {}
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: penpot-assets-pvc
---
